<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 花花 - Architect - 樱花粉 #FF8FA3 - 圆形 -->
  <defs>
    <linearGradient id="huahua-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8FA3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B85;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#huahua-bg)"/>
  
  <!-- 花朵图标 -->
  <g fill="white" opacity="0.95">
    <circle cx="50" cy="45" r="8"/>
    <circle cx="50" cy="30" r="6" opacity="0.8"/>
    <circle cx="50" cy="60" r="6" opacity="0.8"/>
    <circle cx="35" cy="45" r="6" opacity="0.8"/>
    <circle cx="65" cy="45" r="6" opacity="0.8"/>
    <circle cx="40" cy="35" r="5" opacity="0.6"/>
    <circle cx="60" cy="35" r="5" opacity="0.6"/>
    <circle cx="40" cy="55" r="5" opacity="0.6"/>
    <circle cx="60" cy="55" r="5" opacity="0.6"/>
  </g>
  
  <!-- 光晕效果 -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#FF8FA3" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
