<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Unknown - 引导者 - 红色 #FF0000 - 半透明 -->
  <defs>
    <radialGradient id="unknown-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:0.3" />
    </radialGradient>
    <filter id="unknown-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- 模糊圆形背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#unknown-bg)" filter="url(#unknown-blur)"/>
  
  <!-- 问号图标 -->
  <g fill="white" opacity="0.8">
    <text x="50" y="58" font-family="Arial, sans-serif" font-size="50" text-anchor="middle" font-weight="bold">?</text>
  </g>
  
  <!-- 闪烁光晕 -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#FF0000" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 神秘粒子效果 -->
  <g fill="#FF0000" opacity="0.6">
    <circle cx="30" cy="30" r="2">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="30" r="2">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="70" r="2">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="70" r="2">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
