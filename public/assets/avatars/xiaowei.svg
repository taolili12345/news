<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 小薇 - CEO - 星空紫 #6B4C9A - 六边形 -->
  <defs>
    <linearGradient id="xiaowei-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4C9A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A356B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 六边形背景 -->
  <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="url(#xiaowei-bg)"/>
  
  <!-- 管理图表图标 -->
  <g fill="white" opacity="0.95">
    <rect x="30" y="35" width="8" height="30" rx="2"/>
    <rect x="46" y="25" width="8" height="40" rx="2"/>
    <rect x="62" y="45" width="8" height="20" rx="2"/>
  </g>
  
  <!-- 光晕效果 -->
  <polygon points="50,8 87,27 87,73 50,92 13,73 13,27" fill="none" stroke="#6B4C9A" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </polygon>
</svg>
