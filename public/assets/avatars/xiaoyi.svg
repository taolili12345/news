<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 小艺 - 设计师 - 暖橙色 #FF6B35 - 五边形 -->
  <defs>
    <linearGradient id="xiaoyi-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85D2A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 五边形背景 -->
  <polygon points="50,5 90,35 75,85 25,85 10,35" fill="url(#xiaoyi-bg)"/>
  
  <!-- 调色板图标 -->
  <g fill="white" opacity="0.95">
    <ellipse cx="50" cy="50" rx="30" ry="22"/>
    <circle cx="38" cy="45" r="4" fill="#FF6B35"/>
    <circle cx="50" cy="40" r="4" fill="#4A9EFF"/>
    <circle cx="62" cy="45" r="4" fill="#52C41A"/>
    <circle cx="56" cy="55" r="4" fill="#6B4C9A"/>
    <circle cx="44" cy="55" r="4" fill="#FF8FA3"/>
  </g>
  
  <!-- 光晕效果 -->
  <polygon points="50,7 88,37 73,83 27,83 12,37" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </polygon>
</svg>
