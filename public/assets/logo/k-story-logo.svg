<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 深空蓝渐变 -->
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D44;stop-opacity:1" />
    </linearGradient>
    
    <!-- 荧光青发光 -->
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00F5D4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00F5D4;stop-opacity:0" />
    </radialGradient>
    
    <!-- 暖橙色发光 -->
    <radialGradient id="orange-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0" />
    </radialGradient>
    
    <!-- 时间连线渐变 -->
    <linearGradient id="timeline-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F5D4;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#00F5D4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00F5D4;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- 六边形外框（代表团队） -->
  <polygon points="100,10 180,50 180,150 100,190 20,150 20,50" 
           fill="none" stroke="#00F5D4" stroke-width="3" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- 背景发光效果 -->
  <circle cx="100" cy="100" r="80" fill="url(#cyan-glow)" opacity="0.3"/>
  <circle cx="100" cy="100" r="60" fill="url(#orange-glow)" opacity="0.2"/>
  
  <!-- 时间连线（环绕 K 的轨道） -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#timeline-gradient)" stroke-width="2" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="100" cy="100" rx="50" ry="18" fill="none" stroke="url(#timeline-gradient)" stroke-width="2" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- K 字母（创造者） -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="70" text-anchor="middle" 
        font-weight="bold" fill="white" opacity="0.95" style="text-shadow: 0 0 20px #00F5D4;">
    K
  </text>
  
  <!-- 小字 "的故事" -->
  <text x="100" y="145" font-family="'Source Han Sans SC', sans-serif" font-size="18" text-anchor="middle" 
        fill="#8A8A9E" letter-spacing="4">
    的故事
  </text>
  
  <!-- 底部装饰线 -->
  <line x1="60" y1="160" x2="140" y2="160" stroke="#FF6B35" stroke-width="2" opacity="0.6">
    <animate attributeName="x1" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="140;130;140" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- 粒子效果 -->
  <g fill="#00F5D4" opacity="0.6">
    <circle cx="40" cy="60" r="2">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="70" r="2">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="140" r="2">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="130" r="2">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
